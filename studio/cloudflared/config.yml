# cloudflared tunnel config for the Terragravity Studio hop.
#
# Recreate on a fresh host with:
#   cloudflared tunnel create terragravity-studio
#   cloudflared tunnel route dns terragravity-studio studio.terragravity.cloud
# then fill <TUNNEL_UUID> + credentials path below and run:
#   cloudflared tunnel --config this-file run terragravity-studio
#
# The tunnel UUID and credentials file are host-specific and NOT committed.
# Replace <TUNNEL_UUID> with the value printed by `cloudflared tunnel create`.

tunnel: <TUNNEL_UUID>
credentials-file: <HOME>/.cloudflared/<TUNNEL_UUID>.json

ingress:
  # Public hostname (DNS route on the terragravity.cloud zone) -> local FastAPI
  - hostname: studio.terragravity.cloud
    service: http://127.0.0.1:8088
  # Catch-all (required last rule)
  - service: http_status:404
